<!DOCTYPE html>
<html> 
    <head> 
        <title>AYLOUFLIX</title>
        <meta charset="utf-8" /> 
        <link rel="stylesheet" href="style_register.css"> 
        <link rel="icon" type="image/png" sizes="32x32" href="image/logo/logo.png">
    </head>

    <body>
        <div class="box_register"> 
            <h3>Connexion</h3>
            <input type="email" placeholder="Email" class="input" id="email">
            <input type="password" placeholder="Mot de passe" class="input" id="password">
            <p id="error_msg" class="error_msg">Veuillez remplir tous les champs.</p>
            <button class="contact_button" onclick="verifierConnexion()">Se connecter</button>
            <p>Pas encore inscrit ? <a href="register.html">Créer un compte</a></p>
        </div>

        <script>
            function verifierConnexion() {
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value.trim();
                const errorMsg = document.getElementById("error_msg");

                if (email === "" || password === "") {
                    errorMsg.style.display = "block";
                } else {
                    errorMsg.style.display = "none";
                    window.location.href = "home.html"
                }
            }
        </script>
    </body>
</html>
